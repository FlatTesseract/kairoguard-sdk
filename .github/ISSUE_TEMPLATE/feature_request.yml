name: Feature request
description: Propose a new SDK capability or API improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user or developer problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      description: Describe the API shape and expected behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other solutions you considered and why they fall short.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, references, or code samples.
