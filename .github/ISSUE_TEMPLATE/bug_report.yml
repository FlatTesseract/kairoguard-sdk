name: Bug report
description: Report a reproducible SDK bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting. Please provide enough detail for reproducibility.
  - type: input
    id: sdkVersion
    attributes:
      label: SDK version
      placeholder: 0.0.12
    validations:
      required: true
  - type: input
    id: nodeVersion
    attributes:
      label: Node version
      placeholder: 20.11.0
    validations:
      required: true
  - type: input
    id: chainNetwork
    attributes:
      label: Chain and network
      placeholder: EVM Base Sepolia, Solana Devnet, Sui Testnet
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Create client...
        2. Call method...
        3. Observe error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs/errors
      render: shell
